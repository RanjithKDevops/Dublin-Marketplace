name: CI/CD Pipeline for Dublin Marketplace

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit pylint pytest
    
    - name: Test imports
      run: |
        python -c "from app import app; print('✓ App imports successfully')"
        python -c "from models import db; print('✓ Models import successfully')"
        python -c "from forms import ListingForm; print('✓ Forms import successfully')"
    
    - name: Run security scan with Bandit
      run: |
        bandit -r . -f html -o bandit-report.html || true
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.html
          bandit-report.json
        retention-days: 7
    
    - name: Run Pylint for code quality
      run: |
        pylint app.py models.py forms.py --exit-zero --output-format=html > pylint-report.html || true
    
    - name: Upload Pylint report
      uses: actions/upload-artifact@v4
      with:
        name: quality-reports
        path: pylint-report.html
        retention-days: 7

  # Job 2: SonarCloud Analysis
  sonarcloud-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install bandit
    
    - name: Run Bandit for SonarCloud
      run: |
        bandit -r . -f json -o bandit-report.json || true
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.sources=.
          -Dsonar.exclusions=**/venv/**,**/__pycache__/**,**/templates/**,**/static/**,**/tests/**
          -Dsonar.python.version=3
          -Dsonar.python.bandit.reportPaths=bandit-report.json

  # Job 3: Deploy to Ubuntu EC2
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test, sonarcloud-analysis]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create deployment package
      run: |
        # Create a tar file with all application files
        tar -czf dublin-marketplace.tar.gz app.py models.py forms.py requirements.txt templates/ 2>/dev/null || tar -czf dublin-marketplace.tar.gz app.py models.py forms.py requirements.txt
        echo "Deployment package created successfully"
    
    - name: Deploy to Ubuntu EC2
      env:
        SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
      run: |
        # Save SSH key
        echo "Setting up SSH key..."
        echo "$SSH_PRIVATE_KEY" > deploy_key
        chmod 600 deploy_key
        
        # Test SSH connection
        echo "Testing SSH connection to $EC2_USER@$EC2_HOST..."
        ssh -o StrictHostKeyChecking=no -i deploy_key $EC2_USER@$EC2_HOST "echo '✓ SSH connection successful'"
        
        # Copy files to EC2
        echo "Copying deployment package to EC2..."
        scp -o StrictHostKeyChecking=no -i deploy_key dublin-marketplace.tar.gz $EC2_USER@$EC2_HOST:/home/$EC2_USER/
        
        # Deploy on EC2
        echo "Deploying application on EC2..."
        ssh -o StrictHostKeyChecking=no -i deploy_key $EC2_USER@$EC2_HOST << 'ENDSSH'
          # Navigate to home directory
          cd /home/ubuntu
          
          # Extract files
          echo "Extracting deployment package..."
          tar -xzf dublin-marketplace.tar.gz
          
          # Set up Python virtual environment
          echo "Setting up Python environment..."
          python3 -m venv venv
          source venv/bin/activate
          
          # Install dependencies
          echo "Installing Python dependencies..."
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # Kill existing Flask app if running
          echo "Stopping existing application..."
          pkill -f "python3 app.py" || echo "No existing process found"
          
          # Start the application
          echo "Starting application..."
          nohup python3 app.py > app.log 2>&1 &
          
          # Wait for app to start
          sleep 5
          
          # Check if app is running
          if pgrep -f "python3 app.py" > /dev/null; then
            echo "✓ Application started successfully!"
            echo "App is running on port 5000"
            echo "Check logs: tail -f app.log"
          else
            echo "✗ Application failed to start"
            echo "Last 20 lines of app.log:"
            tail -20 app.log
            exit 1
          fi
        ENDSSH
        
        # Clean up
        rm deploy_key
        echo "✓ Deployment completed successfully!"
    
    - name: Verify Deployment
      run: |
        echo "Waiting for application to be fully ready..."
        sleep 10
        echo "Deployment verification complete"
        echo "Application should be accessible at: http://${{ secrets.EC2_HOST }}:5000"
