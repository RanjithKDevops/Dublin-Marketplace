name: CI/CD Pipeline for Dublin Marketplace

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit pylint pytest
    
    - name: Test imports
      run: |
        python -c "from app import app; print('✓ App imports successfully')"
        python -c "from models import db; print('✓ Models import successfully')"
        python -c "from forms import ListingForm; print('✓ Forms import successfully')"
    
    - name: Run security scan with Bandit
      run: |
        bandit -r . -f html -o bandit-report.html || true
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: bandit-report.*
    
    - name: Run Pylint for code quality
      run: |
        pylint app.py models.py forms.py --exit-zero --output-format=html > pylint-report.html || true
    
    - name: Upload Pylint report
      uses: actions/upload-artifact@v3
      with:
        name: quality-reports
        path: pylint-report.html

  # Job 2: SonarCloud Analysis
  sonarcloud-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install bandit
    
    - name: Run Bandit for SonarCloud
      run: |
        bandit -r . -f json -o bandit-report.json || true
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.sources=.
          -Dsonar.exclusions=**/venv/**,**/__pycache__/**,**/templates/**,**/static/**,**/tests/**
          -Dsonar.python.version=3
          -Dsonar.python.bandit.reportPaths=bandit-report.json

  # Job 3: Deploy to AWS EC2
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test, sonarcloud-analysis]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Create deployment package
      run: |
        # Create a tar file with all application files
        tar -czf dublin-marketplace.tar.gz app.py models.py forms.py requirements.txt templates/ static/ 2>/dev/null || tar -czf dublin-marketplace.tar.gz app.py models.py forms.py requirements.txt templates/
    
    - name: Deploy to EC2
      env:
        SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
      run: |
        # Save SSH key
        echo "$SSH_PRIVATE_KEY" > deploy_key
        chmod 600 deploy_key
        
        # Copy files to EC2
        scp -o StrictHostKeyChecking=no -i deploy_key dublin-marketplace.tar.gz $EC2_USER@$EC2_HOST:/home/$EC2_USER/
        
        # SSH into EC2 and deploy
        ssh -o StrictHostKeyChecking=no -i deploy_key $EC2_USER@$EC2_HOST << 'EOF'
          # Extract files
          cd /home/$EC2_USER
          tar -xzf dublin-marketplace.tar.gz
          
          # Set up Python environment
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Kill existing app if running
          pkill -f "python3 app.py" || true
          
          # Start the application
          nohup python3 app.py > app.log 2>&1 &
          
          # Check if app started
          sleep 5
          if pgrep -f "python3 app.py" > /dev/null; then
            echo "✓ Application deployed successfully"
          else
            echo "✗ Application failed to start"
            cat app.log
            exit 1
          fi
        EOF
        
        # Clean up
        rm deploy_key
