name: CI/CD Pipeline for Dublin Marketplace

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ============================================
  # JOB 1: Build, Test, and Security Scan
  # ============================================
  build-and-test:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit pylint pytest
    
    - name: Test Python imports
      run: |
        python -c "from app import app; print('✓ App imports successfully')"
        python -c "from models import db; print('✓ Models import successfully')"
        python -c "from forms import ListingForm; print('✓ Forms import successfully')"
        echo "All imports verified successfully"
    
    - name: Run Bandit security scan
      run: |
        # Generate Bandit reports in multiple formats
        bandit -r . -f html -o bandit-report.html || true
        bandit -r . -f txt -o bandit-report.txt || true
        bandit -r . -f json -o bandit-report.json || true
        echo "Security scan completed"
        
        # DEBUG: List files to verify they were created
        echo "=== Files created by Bandit ==="
        ls -la bandit-* || echo "No bandit files found"
        
        # Show summary in logs
        echo "=== Bandit Security Scan Summary ==="
        if [ -f bandit-report.txt ]; then
          head -20 bandit-report.txt
        else
          echo "No bandit-report.txt found - Bandit may have failed"
        fi 
    - name: Upload Bandit security report
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.html
          bandit-report.txt
          bandit-report.json
        retention-days: 7
    
    - name: Run Pylint code quality check
      run: |
        # Generate Pylint reports in text format (reliable)
        echo "Running Pylint code quality check..."
        pylint app.py models.py forms.py --exit-zero > pylint-report.txt 2>&1 || true
        
        # Extract just the score
        pylint app.py models.py forms.py --exit-zero 2>&1 | grep "rated at" > pylint-score.txt || echo "Score extraction failed" > pylint-score.txt
        
        # Generate detailed report with line numbers (parseable format)
        pylint app.py models.py forms.py --exit-zero --output-format=parseable > pylint-details.txt 2>&1 || true
        
        echo "Code quality check completed"
        echo "=== Pylint Score ==="
        cat pylint-score.txt || echo "No score generated"
    
    - name: Upload Pylint quality report
      uses: actions/upload-artifact@v4
      with:
        name: quality-reports
        path: |
          pylint-report.txt
          pylint-score.txt
          pylint-details.txt
        retention-days: 7

  # ============================================
  # JOB 2: SonarCloud Static Code Analysis
  # ============================================
  sonarcloud-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for SonarCloud analysis
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install bandit
    
    - name: Run Bandit for SonarCloud
      run: |
        bandit -r . -f json -o bandit-report.json || true
        # Create empty report if none generated
        if [ ! -f bandit-report.json ]; then
          echo '{"results": []}' > bandit-report.json
        fi
        echo "Bandit report generated for SonarCloud"
    
    - name: Create SonarCloud properties file
      run: |
        cat > sonar-project.properties << EOF
        sonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
        sonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        sonar.host.url=https://sonarcloud.io
        sonar.sources=.
        sonar.exclusions=**/venv/**,**/__pycache__/**,**/templates/**,**/static/**,**/tests/**,**/.github/**,**/bandit-report.*
        sonar.python.version=3
        sonar.python.bandit.reportPaths=bandit-report.json
        sonar.sourceEncoding=UTF-8
        EOF
        echo "sonar-project.properties created"
        cat sonar-project.properties
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: .
        args: >
          -Dsonar.verbose=false
          -Dsonar.scm.provider=git

  # ============================================
  # JOB 3: Deploy to Ubuntu EC2 (Only on main branch)
  # ============================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-test, sonarcloud-analysis]
    if: github.ref == 'refs/heads/main' && success()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create deployment package
      run: |
        # Create deployment directory
        mkdir -p deploy_package
        
        # Copy application files
        cp app.py models.py forms.py requirements.txt deploy_package/
        cp -r templates deploy_package/ 2>/dev/null || true
        cp -r static deploy_package/ 2>/dev/null || true
        
        # Create tar file
        cd deploy_package
        tar -czf ../dublin-marketplace.tar.gz .
        cd ..
        
        echo "Deployment package created: dublin-marketplace.tar.gz"
        ls -la dublin-marketplace.tar.gz
    
    - name: Deploy to Ubuntu EC2
      env:
        SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
      run: |
        # Validate secrets are present
        if [ -z "$SSH_PRIVATE_KEY" ]; then
          echo "❌ EC2_SSH_KEY secret is missing"
          exit 1
        fi
        if [ -z "$EC2_HOST" ]; then
          echo "❌ EC2_HOST secret is missing"
          exit 1
        fi
        if [ -z "$EC2_USER" ]; then
          echo "❌ EC2_USER secret is missing"
          exit 1
        fi
        
        # Setup SSH key
        echo "$SSH_PRIVATE_KEY" > deploy_key
        chmod 600 deploy_key
        
        # Test SSH connection
        echo "🔍 Testing SSH connection to $EC2_USER@$EC2_HOST..."
        if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i deploy_key $EC2_USER@$EC2_HOST "echo '✅ SSH connection successful'"; then
          echo "SSH connection verified"
        else
          echo "❌ SSH connection failed"
          exit 1
        fi
        
        # Copy deployment package to /tmp first (more space)
        echo "📦 Copying deployment package to EC2 /tmp..."
        scp -o StrictHostKeyChecking=no -i deploy_key dublin-marketplace.tar.gz $EC2_USER@$EC2_HOST:/tmp/
        
        # Deploy on EC2
        echo "🚀 Deploying application on EC2..."
        ssh -o StrictHostKeyChecking=no -i deploy_key $EC2_USER@$EC2_HOST << 'DEPLOY_SCRIPT'
          # Navigate to home directory
          cd /home/ubuntu
          
          # Clean up old app directory
          echo "Cleaning up old files..."
          rm -rf dublin-marketplace
          
          # Create app directory
          mkdir -p dublin-marketplace
          cd dublin-marketplace
          
          # Extract deployment package from /tmp
          echo "Extracting deployment package..."
          tar -xzf /tmp/dublin-marketplace.tar.gz
          
          # Set up Python virtual environment
          echo "Setting up Python virtual environment..."
          python3 -m venv venv
          source venv/bin/activate
          
          # Upgrade pip and install dependencies
          echo "Installing Python dependencies..."
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # Kill existing Flask app if running
          echo "Stopping existing application..."
          pkill -f "python3 app.py" || echo "No existing process found"
          
          # Start the application
          echo "Starting application..."
          nohup python3 app.py > app.log 2>&1 &
          
          # Wait for app to start
          sleep 5
          
          # Verify application is running
          if pgrep -f "python3 app.py" > /dev/null; then
            echo "✅ Application started successfully!"
            echo "App running with PID: $(pgrep -f 'python3 app.py')"
          else
            echo "❌ Application failed to start"
            echo "Last 20 lines of app.log:"
            tail -20 app.log
            exit 1
          fi
          
          # Clean up tar file from /tmp
          rm -f /tmp/dublin-marketplace.tar.gz
          echo "Deployment completed successfully"
        DEPLOY_SCRIPT
        
        # Clean up
        rm deploy_key
        echo "✅ Deployment finished!"
    
    - name: Verify Deployment
      run: |
        echo "=========================================="
        echo "DEPLOYMENT VERIFICATION"
        echo "=========================================="
        echo "Application should be accessible at:"
        echo "http://${{ secrets.EC2_HOST }}:5000"
        echo ""
        echo "To view logs on EC2:"
        echo "ssh -i deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'tail -f /home/ubuntu/dublin-marketplace/app.log'"
        echo "=========================================="

  # ============================================
  # JOB 4: Summary
  # ============================================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, sonarcloud-analysis, deploy]
    if: always()
    
    steps:
    - name: Print Summary
      run: |
        echo "=========================================="
        echo "CI/CD PIPELINE SUMMARY"
        echo "=========================================="
        echo ""
        echo "Build & Security Scan: ${{ needs.build-and-test.result }}"
        echo "SonarCloud Analysis: ${{ needs.sonarcloud-analysis.result }}"
        echo "Deployment: ${{ needs.deploy.result }}"
        echo ""
        echo "Application URL: http://${{ secrets.EC2_HOST }}:5000"
        echo "SonarCloud Dashboard: https://sonarcloud.io/project/overview?id=${{ secrets.SONAR_PROJECT_KEY }}"
        echo ""
        echo "Artifacts available:"
        echo "  - security-reports (Bandit HTML, TXT, JSON)"
        echo "  - quality-reports (Pylint TXT, Score, Details)"
        echo "=========================================="
